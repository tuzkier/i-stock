$schema: "https://json-schema.org/draft/2020-12/schema"
# Schema for the discovery-brief external Control Contract.
# Sourced by harness-cli `contract check --artifact .../discovery-brief.contract.yaml`
# and consumed downstream by the discovery-effectiveness-reviewer for HOLD / PASS
# verdicts. M4.2 lint rules (W-spec-coverage / W-discovery-contract /
# W-graphify-source) are layered on top of the structural validation defined here.
allOf:
  - $ref: common.yaml
  - type: object
    required:
      - mission_id
      - stage
      - affected_capabilities
      - roles
      - scenarios
      - existing_solutions
    properties:
      type:
        const: behaviour_contract
      subtype:
        const: discovery_brief
      stage:
        const: discovery
      produced_at:
        type: string
        description: ISO-8601 timestamp when discovery-analyst wrote this brief.
      affected_capabilities:
        type: array
        description: |
          Each entry maps a touched capability to a confidence level and the
          evidence chain that supports it. ASSUMED / UNCERTAIN entries must
          carry an inference path so prd / solution can decide whether to
          escalate to a Decision Gate or accept the downstream risk.
        items:
          type: object
          required: [capability, confidence, evidence_or_inference]
          properties:
            capability:
              type: string
            requirement_id:
              type: string
            confidence:
              type: string
              enum: [CONFIRMED, UNCERTAIN, ASSUMED]
            evidence_or_inference:
              type: string
              minLength: 1
      roles:
        type: array
        items:
          type: object
          required: [role, core_need]
          properties:
            role:
              type: string
            core_need:
              type: string
              minLength: 1
            frequency:
              type: string
              enum: [high, medium, low]
            tech_level:
              type: string
      scenarios:
        type: array
        description: |
          happy_path / exception / edge_case must each be covered at least once
          for non-trivial missions; downstream W-discovery-contract lint rule
          (M4.2) enforces coverage.
        items:
          type: object
          required: [kind, description]
          properties:
            kind:
              type: string
              enum: [happy_path, exception, edge_case]
            description:
              type: string
              minLength: 1
            related_roles:
              type: array
              items:
                type: string
      existing_solutions:
        type: array
        description: |
          Brownfield missions must produce at least one entry sourced from
          graphify_symbol or graphify_query so the brief does not lean on
          grep-only evidence (W-graphify-source, M4.2).
        items:
          type: object
          required: [description, source, reference]
          properties:
            description:
              type: string
              minLength: 1
            source:
              type: string
              enum:
                - graphify_symbol
                - graphify_query
                - grep
                - manual_read
                - web_url
            reference:
              type: string
              minLength: 1
      design_assumptions:
        type: array
        items:
          type: object
          required: [assumption, impact_on]
          properties:
            assumption:
              type: string
              minLength: 1
            impact_on:
              type: string
              enum: [prd, solution, technical_analysis, verify]
      agent_engineering_candidates:
        type: array
        description: |
          Discovery Step 7 decision matrix output. `recommended: agentize`
          requires all four boolean inputs to be true (autonomy &&
          runtime_context && multi_step_reasoning && uncertainty); strict
          enforcement lands in harness-cli `discovery agent-eng-eval` (M4.3).
        items:
          type: object
          required: [component, recommended]
          properties:
            component:
              type: string
              minLength: 1
            autonomy:
              type: boolean
            runtime_context:
              type: boolean
            multi_step_reasoning:
              type: boolean
            uncertainty:
              type: boolean
            recommended:
              type: string
              enum: [agentize, deterministic, undecided]
      degradations:
        type: array
        description: |
          When a HARD-GATE input (graphify index freshness, web fetch, spec
          scan) cannot be satisfied, the brief must record the degradation
          and the compensating manual action so reviewer / lint can accept
          the gap instead of silently passing.
        items:
          type: object
          required: [kind, reason, compensating_action]
          properties:
            kind:
              type: string
              enum: [graphify_unavailable, graphify_stale, web_failed]
            reason:
              type: string
              minLength: 1
            compensating_action:
              type: string
              minLength: 1
