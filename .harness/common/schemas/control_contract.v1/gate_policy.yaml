$schema: "https://json-schema.org/draft/2020-12/schema"
type: object
required: [gate_policy]
properties:
  gate_policy:
    type: object
    required: [id, gate, blocking_rules]
    properties:
      id:
        type: string
        minLength: 1
      gate:
        type: string
        minLength: 1
      blocking_rules:
        type: array
        minItems: 1
        items:
          type: string
      warn_rules:
        type: array
        items:
          type: string
additionalProperties: false
