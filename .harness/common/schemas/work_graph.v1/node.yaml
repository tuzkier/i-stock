$schema: https://json-schema.org/draft/2020-12/schema
$id: work_graph.v1/node.yaml
type: object
required:
  - id
  - kind
  - title
  - lane
  - stage
  - status
properties:
  id:
    type: string
    pattern: "^[A-Z]+-[A-Za-z0-9-]+$"
  kind:
    type: string
  title:
    type: string
    minLength: 1
  lane:
    type: string
    enum:
      - requirement-lane
      - product-definition-lane
      - solution-lane
      - technical-analysis-lane
      - breakdown-lane
      - development-lane
      - verification-lane
      - delivery-lane
  stage:
    type: string
  status:
    type: string
    enum:
      - ready
      - active
      - blocked
      - deferred
      - done
  priority:
    type: string
  updated_at:
    type:
      - string
      - "null"
  inputs:
    type: array
    items:
      type: string
  outputs:
    type: array
    items:
      type: string
  relations:
    type: object
    properties:
      depends_on:
        type: array
        items:
          type: string
      conflicts_with:
        type: array
        items:
          type: string
      duplicates:
        type: array
        items:
          type: string
      supersedes:
        type: array
        items:
          type: string
      split_from:
        type:
          - string
          - "null"
      merged_from:
        type: array
        items:
          type: string
      merged_into:
        type:
          - string
          - "null"
  artifact:
    type:
      - object
      - "null"
  specs:
    type: object
    properties:
      produces:
        type: array
        items:
          type: object
          required:
            - path
          properties:
            path:
              type: string
            requirement:
              type: string
            scenario:
              type: string
            status:
              enum:
                - draft
                - ready
                - verified
                - accepted
                - deferred
                - rejected
          additionalProperties: true
      consumes:
        type: array
        items:
          type: object
          required:
            - path
            - requirement
            - scenario
          properties:
            path:
              type: string
            requirement:
              type: string
            scenario:
              type: string
            evidence:
              type: object
              properties:
                implementation_refs:
                  type: array
                  items:
                    type: string
                test_refs:
                  type: array
                  items:
                    type: string
                command_refs:
                  type: array
                  items:
                    type: string
              additionalProperties: true
          additionalProperties: true
    additionalProperties: true
  trace:
    type: object
additionalProperties: true
allOf:
  - if:
      properties:
        kind:
          const: epic
    then:
      properties:
        id:
          pattern: "^EPIC-[A-Za-z0-9-]+$"
  - if:
      properties:
        kind:
          const: requirement
    then:
      properties:
        id:
          pattern: "^REQ-[A-Za-z0-9-]+$"
  - if:
      properties:
        kind:
          const: prd
    then:
      properties:
        id:
          pattern: "^PRD-[A-Za-z0-9-]+$"
  - if:
      properties:
        kind:
          const: solution
    then:
      properties:
        id:
          pattern: "^SOL-[A-Za-z0-9-]+$"
  - if:
      properties:
        kind:
          const: interaction
    then:
      properties:
        id:
          pattern: "^INT-[A-Za-z0-9-]+$"
  - if:
      properties:
        kind:
          const: technical_design
    then:
      properties:
        id:
          pattern: "^TECH-[A-Za-z0-9-]+$"
  - if:
      properties:
        kind:
          const: task
    then:
      properties:
        id:
          pattern: "^TASK-[A-Za-z0-9-]+$"
  - if:
      properties:
        kind:
          const: decision
    then:
      properties:
        id:
          pattern: "^DEC-[A-Za-z0-9-]+$"
  - if:
      properties:
        kind:
          const: bug
    then:
      properties:
        id:
          pattern: "^BUG-[A-Za-z0-9-]+$"
  - if:
      properties:
        kind:
          const: research
    then:
      properties:
        id:
          pattern: "^RESEARCH-[A-Za-z0-9-]+$"
  - if:
      properties:
        kind:
          const: follow_up
    then:
      properties:
        id:
          pattern: "^FOLLOW-[A-Za-z0-9-]+$"
