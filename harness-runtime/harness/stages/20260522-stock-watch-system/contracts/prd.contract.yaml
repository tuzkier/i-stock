  non_functional_requirements:
  - id: NFR-01
    category: 可解释性
    requirement: MTS 与提醒必须带结构化语义，不能退化成单一颜色或买卖词。
    metric: 页面可观察到趋势状态、分数带、信号类型、提醒等级、理由和失效条件。
    verification_method: BUC-04 / BUC-05 UI 检查与 fixture 回放。
  - id: NFR-02
    category: 连续性
    requirement: 同一浏览器配置内用户关闭后重开仍能继续使用核心配置。
    metric: 自选、提醒和基础看盘上下文可恢复。
    verification_method: 浏览器重开恢复验证。
  - id: NFR-03
    category: 降级透明性
    requirement: 来源降级或数据不足时必须显式提示。
    metric: 用户能区分正式、演示、降级和数据不足状态。
    verification_method: 降级场景截图和状态断言。
  - id: NFR-04
    category: 范围合规
    requirement: 产品不得输出收益承诺、自动交易动作或确定性投资建议。
    metric: 无下单、保证收益、胜率承诺等越界语义。
    verification_method: 内容审查与验收清单。
  - id: NFR-05
    category: 可替换性约束
    requirement: 下游方案必须优先评估成熟、维护活跃、许可合适的现成开源库。
    metric: 选型文档覆盖图表、指标、通知、数据接入候选比较。
    verification_method: solution / technical design 评审。
  - id: NFR-06
    category: 确定性
    requirement: 第一阶段 MTS 与提醒计算链路必须保持 deterministic。
    metric: 相同 fixture 输入产生相同 MTS 和提醒结果。
    verification_method: fixture / 回放样本验证。
  business_rules:
  - id: RULE-01
    source: BR-001
    summary: 自选标的必须归属于已支持市场并保留原始代码与归一代码
  - id: RULE-02
    source: BR-002
    summary: 自选与提醒本地恢复不依赖账号；归档标的提醒暂停且恢复后按原启停意图恢复
  - id: RULE-03
    source: BR-004
    summary: 历史数据不足时可以展示价格，但不得产出伪造指标或 MTS 结论
  - id: RULE-04
    source: BR-005
    summary: 来源降级必须显式显示正式 / 演示 / 降级语义
  - id: RULE-05
    source: BR-006
    summary: 默认布局必须包含主图、成交量和一个可切换副图
  - id: RULE-06
    source: BR-007
    summary: 指标与 MTS 只能服务解释与提醒，不得被包装成收益承诺
  - id: RULE-07
    source: BR-008
    summary: MTS 必须同时表达趋势状态、分数带、信号类型和提醒等级
  - id: RULE-08
    source: BR-010/BR-011
    summary: 买点必须区分趋势回调和收敛突破；风险必须区分趋势破坏、动量衰竭和风控止损
  - id: RULE-09
    source: BR-012/BR-013
    summary: 提醒必须保持四级语义且风控优先级最高
  - id: RULE-10
    source: BR-014
    summary: Legacy composite signal 不得冒充正式 MTS
