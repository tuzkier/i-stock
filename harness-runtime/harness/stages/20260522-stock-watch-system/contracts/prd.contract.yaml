    cases:
    - buc_id: BUC-01
      name: 管理多市场自选标的
      actor: 个人投资者
      trigger: 用户新增、归档或恢复标的
      goal: 把四市场标的纳入同一本地观察清单并保持可识别。
      related_bo:
      - BO-001
      - BO-002
      - BO-006
      priority: P0
      detail_level: detail_required
      prototype_required: true
      main_path_summary: 识别市场、保存原始代码与归一代码、维持市场分组、允许归档后恢复。
      exceptions_boundaries:
      - 市场不可识别时不得进入 active
      - 重复标的保持同一观察对象语义
      state_changes:
      - bo_id: BO-001
        from: draft_added
        to: active
      - bo_id: BO-001
        from: active
        to: archived
      validation_signals:
      - UI 状态
      - 持久化状态
      - BO 状态
      traces_to:
