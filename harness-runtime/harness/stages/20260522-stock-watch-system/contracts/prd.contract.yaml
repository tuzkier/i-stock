      name: 打开标的进入默认看盘布局
      actor: 个人投资者 / 技术分析用户
      trigger: 用户选中 active 标的
      goal: 同时看到主图、成交量和副图指标上下文。
      related_bo:
      - BO-001
      - BO-003
      - BO-004
      - BO-008
      priority: P0
      detail_level: detail_required
      prototype_required: true
      main_path_summary: 选中标的后展示默认主图、成交量常驻和一个副图。
      exceptions_boundaries:
      - 数据不足时局部降级
      - 默认布局不得要求用户先配置
      state_changes:
      - bo_id: BO-001
        from: unselected
        to: selected
      - bo_id: BO-004
        from: partial
        to: ready
      validation_signals:
      - UI 状态
      - 页面截图
      - BO 状态
      traces_to:
        user_stories:
        - US-02
        scenarios:
        - SCN-02
        rules:
        - RULE-04
        - RULE-06
        functional_requirements:
        - FR-02
        acceptance_criteria:
        - AC-02
    - buc_id: BUC-03
      name: 切换副图指标观察不同分析维度
      actor: 技术分析用户
      trigger: 用户切换副图选择
      goal: 不离开当前标的即可切换 MACD / RSI / KDJ / ATR。
      related_bo:
      - BO-004
      - BO-008
      priority: P1
      detail_level: map_only
      prototype_required: true
      main_path_summary: 保持主图和成交量上下文不变，仅切换副图解释视角。
      exceptions_boundaries:
      - 切换副图不得导致主图上下文丢失
      state_changes:
      - bo_id: BO-008
        from: default
        to: customized
      validation_signals:
      - UI 状态
      traces_to:
        user_stories:
        - US-02
        scenarios:
        - SCN-02
        rules:
        - RULE-06
        functional_requirements:
        - FR-02
        acceptance_criteria:
