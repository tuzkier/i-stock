  architectural_fitness_functions:
  - id: AFF-01
    protected_quality: provider_agnostic_domain
    measurement: domain objects 与 WorkspaceSnapshot 不含 provider-specific auth/quota/response
      schema 字段。
    threshold: 0 provider-specific 字段进入 WatchSymbol / PriceSeries / AlertRule / WorkspaceSnapshot。
    verification_evidence:
    - VS-01
    - VS-02
  - id: AFF-02
    protected_quality: local_recovery_integrity
    measurement: legacy key、V2 snapshot、损坏 snapshot、大体量 fixture 均可给出明确恢复结果。
    threshold: 无静默数据丢失；失败时 UI 显示恢复状态。
    verification_evidence:
    - VS-05
  - id: AFF-03
    protected_quality: deterministic_signal_explanation
    measurement: 同一 fixture 回放得到同一 MtsExplanation，且 reasonCodes/invalidators 可解释。
    threshold: replay 结果稳定；数据不足显式为 data_insufficient。
    verification_evidence:
    - VS-03
  production_readiness:
    error_handling: 行情失败以 SourceHealth 和降级文案呈现；MTS 数据不足输出 data_insufficient；本地恢复失败回退默认
      focus 布局；提醒校验失败阻断写入并显示原因。
    compatibility: ChartPayload 过渡期保留 bars；legacy watchlist/alerts key 可读；旧四因子评分仅可内部复用，不能作为用户可见正式
      MTS 名称。
    observability: 后端记录 upstream 成功/失败、fallback 原因与 cache 状态；前端展示 SourceHealth、恢复结果、提醒触发理由和降级状态；fixture
      名称可定位 AC/FR。
    rollback: snapshot 迁移失败不清空旧 key；provider 失败切到显式 demo_fallback；图表库不满足合同则降级到读数摘要并走
      Chart Gate；cache 影响恢复或 stale 语义时停用并重审。
