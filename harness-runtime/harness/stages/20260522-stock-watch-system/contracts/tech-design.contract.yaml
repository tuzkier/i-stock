    required_evidence:
    - yahoo_fixture
    - demo_fixture
    - fake_provider_fixture
    - schema_scan
    - AFF-01
  - id: Cache Gate
    owner_stage: technical_analysis / execute / verify
    failure_mode: cache 被当成本地恢复存储，或 stale 语义无法解释。
    blocking_threshold: cache 需要持久化、跨重启、跨 provider 复用，或 stale 服务超过 15 分钟；显式刷新无法绕过
      cache。
    required_evidence:
    - ttl_60s_hit_miss
    - force_refresh_bypass
    - range_provider_invalidation
    - upstream_failure_stale_fixture
    - VS-08
  - id: Storage Gate
    owner_stage: technical_analysis / execute / verify
    failure_mode: WorkspaceSnapshotV2 无法在 localStorage 内可靠迁移、保存或恢复。
    blocking_threshold: 500 个标的 + 2000 条 alert history fixture 超过 2 MB；单次读写/迁移超过 500
      ms；legacy/corrupt fixture 造成 watchlist/alerts 静默丢失。
    required_evidence:
    - legacy_key_fixture
    - corrupt_snapshot_fixture
    - large_snapshot_fixture
    - browser_reopen_restore
    - VS-05
  - id: Chart Gate
    owner_stage: execute / verify
    failure_mode: lightweight-charts 无法稳定承载主图、成交量、副图与 locator contract。
    blocking_threshold: 主图/成交量/副图任一 pane 无法在 fixture e2e 稳定渲染，或 locator 不能绑定用户可见状态。
    required_evidence:
    - chart_fixture_screenshot
    - playwright_locator_assertion
    - fallback_readout_evidence
    - VS-06
    - VS-08
  cache_contract:
    owner: server-side MarketDataSource memory cache
    key: normalizedSymbol + range + interval + provider
    ttl_seconds: 60
    stale_max_minutes: 15
    allowed_states:
    - miss
    - hit
    - bypass
    - stale_fallback
    - disabled
    invalidation:
    - forceRefresh
    - range_change
    - provider_change
    - ttl_expired
    forbidden:
    - localStorage_persistence
    - cross_restart_restore
    - provider_specific_domain_fields
  workspace_layout_contract:
    snapshot_version: 2
    layout_scope:
    - symbol
    - global_fallback
    per_symbol_key: normalizedSymbol
    fields:
    - layoutMode
    - secondaryPanePreference
    - range
    - collapsedSections
    - updatedAt
    restore_status:
    - restored
    - partial
    - default_fallback
    - failed
    fallback_rule: 标的级布局缺失或损坏时只回退该标的到 globalLayoutFallback/default focus，不清空 watchlist/alerts。
  mts_reason_registry:
    version: mts-registry-v1
    code_shape: UPPER_SNAKE_CASE
    categories:
    - trend
    - momentum
    - volatility
    - volume
    - risk
    - source
    - data_quality
    required_entry_fields:
    - id
    - kind
    - category
    - severityHint
    - displayKey
    - introducedIn
    - deprecated
    compatibility: 已发布 code 不删除，只能 deprecated；未知 code 降级为 UNKNOWN_CODE。
  state_flows:
  - id: SF-01
    command: OpenWorkbench / RefreshSourceHealth
    producer: MOD-02
    event: SourceHealthChanged
    consumers:
    - MOD-03
    - MOD-04
    - MOD-05
    - MOD-07
    persistence: none
    ordering: source health before MtsSignalEvaluated and AlertRuleTriggered
    compensation: unknown source state -> unavailable; provider/cache violations trigger
      Gate
  - id: SF-02
    command: ObservationContextRefreshed
    producer: MOD-03
    event: IndicatorStateChanged
    consumers:
    - MOD-04
    - MOD-07
    persistence: none
    ordering: validated PriceSeries before MTS
    compensation: insufficient bars -> partial/unavailable
  - id: SF-03
    command: EvaluateMts
    producer: MOD-04
    event: MtsSignalEvaluated
    consumers:
    - MOD-05
    - MOD-07
    persistence: replay_only
    ordering: after SourceHealthChanged and IndicatorStateChanged
    compensation: unknown registry code -> UNKNOWN_CODE; insufficient data -> data_insufficient
  - id: SF-04
    command: EvaluateAlertRules
    producer: MOD-05
    event: AlertRuleTriggered / AlertRuleAcknowledged / ScheduledAlertMissed
    consumers:
    - MOD-05
    - MOD-07
    - MOD-06
    persistence: AlertRule.history / lastTriggeredAt / acknowledgedAt / missedAt
    ordering: after MTS; risk priority before watch; scheduled only while app open
      local clock tick
    compensation: suspended_by_archive cannot trigger; missed scheduled tick is recorded,
      not backfilled
  - id: SF-05
    command: ArchiveWatchSymbol / RestoreWatchSymbol
    producer: MOD-01 + MOD-06
    event: WatchSymbolArchived / WatchSymbolRestored
    consumers:
    - MOD-05
    - MOD-06
    - MOD-07
    persistence: WorkspaceSnapshotV2.watchlist + alert activation state
    ordering: watchlist state before alert activation change
    compensation: restore cannot clear alert history
  - id: SF-06
    command: RestoreLocalWorkbench
    producer: MOD-06
    event: WorkspaceRestored
    consumers:
    - MOD-01
    - MOD-05
    - MOD-07
    persistence: read legacy/V2; may write migrated V2; never delete old keys"
    ordering: restore before first automatic refresh
    compensation: corrupt snapshot -> default focus; Storage Gate on threshold breach
  scheduled_alert_contract:
    condition_shape:
      mode: daily_time
      localTime: HH:mm
      timezone: local
      daysOfWeek: optional number array 1-7
      skipIfMarketClosed: optional boolean
    timebase: browser_local_clock
    evaluation: app-open only; no background worker, system notification, external
      push, or server scheduler
    missed_tick_policy: do not backfill trigger after app close; record missed_while_closed
      and wait for next local tick
    archive_restore_policy: archived symbols suspend scheduled alerts; restore resumes
      from next tick without clearing history
    acknowledgment_policy: acknowledged and triggered are separate states
