      verify_command_evidence_id: CMD-E2E-T005A
      acceptance_result_evidence_path: 本次交付整理人工实测（2026-07-22，见「关键结果证据」截图摘录）; harness-runtime/harness/artifacts/20260721-watchboard-ui-friendliness/evidence/pt05-top-hierarchy-colors.png;
