control_contract:
  type: delivery_contract
  version: 1
  mission_id: 20260721-watchboard-ui-friendliness
  stage: delivery
  artifact: delivery
  acceptance_result:
    mission_id: 20260721-watchboard-ui-friendliness
    stage: delivery
    artifact: acceptance-result
    delivery_entry:
    - type: cli
      url_or_command: npm run dev
      credential_or_fixture_ref: null
      commit_or_branch: main（工作区未提交改动，本 mission 全程未 commit，见交付包）
    - type: url
      url_or_command: http://localhost:5173
      credential_or_fixture_ref: null
      commit_or_branch: null
    acceptance_trace:
    - acceptance_id: SCN-01-COND-01
      expected: 来源为 formal（真实健康数据）或应用未选中任何标的（not_loaded）时，主区不出现黄色警告横幅，呈中性语义。
      actual: 真实浏览器路径验证：formal/not_loaded 态下来源承载处无 notice--warning/data-notice 类；单测确认
        resolveSourceTone(formal)=normal、resolveSourceTone(not_loaded)=normal。本次交付整理时人工连接沙盒环境实测：因沙盒未接入真实
        FutuOpenD 行情网关，本机演示环境下全部标的呈现的是 unavailable（见 SCN-01-COND-03），未能在本次人工走查中直接观察到
        formal 态；formal 态的用户可观察结果以 E2E 固定证据（tests/e2e/mts/card.spec.ts、tests/e2e/workbench/default.spec.ts）为准，用户在自己接入真实
        FutuOpenD 网关的环境中可直接观察。
      reproduce_steps:
      - 在已连接真实行情源（FutuOpenD 网关正常运行）的环境下执行 npm run dev，浏览器打开 http://localhost:5173
      - 选择任意自选标的（如「腾讯控股」），等待行情加载完成
      - 观察标的标题下方来源提示区：应为中性文字/无色块提示，不出现黄色警告横幅
      - 应用刚打开、尚未选中任何标的时（not_loaded），同样应无黄色警告横幅
      verify_command_evidence_id: CMD-E2E-T002/CMD-E2E-T005A
      acceptance_result_evidence_path: tests/e2e/mts/card.spec.ts; tests/e2e/workbench/default.spec.ts;
        本次交付整理人工核实：沙盒环境因无 FutuOpenD 连接无法复现 formal 态，见「关键结果证据」说明
      result_status: pass
    - acceptance_id: SCN-01-COND-02
      expected: 来源为 demo_fallback（降级可用/演示数据）时呈现信息级/次级提示，不使用与 stale/unavailable 相同的高危警告色。
      actual: 真实浏览器路径验证（Playwright 固定 fixture 注入 demo_fallback 状态）：呈现 notice--info
        类，非 notice--warning。经查当前 src/domain/market-data-source.ts 的真实数据获取逻辑目前只会产出
        formal / stale / unavailable 三态，demo_fallback 是类型层面已支持、但当前真实数据链路尚未有代码路径主动产出的状态（非本次改造引入，属既有产品未接通场景）。
      reproduce_steps:
      - 当前构建下，demo_fallback 状态无法通过真实点击操作在界面上触发（真实数据源不产出该状态）
      - 可复核方式：查看 tests/e2e/gate/acceptance-matrix.spec.ts 中 AC-02/AC-03 用例的 Playwright
        HTML 报告（playwright-report/index.html），该报告以受控数据直接驱动 demo_fallback 渲染并断言样式
      verify_command_evidence_id: CMD-E2E-T003
      acceptance_result_evidence_path: tests/e2e/gate/acceptance-matrix.spec.ts:47;
        tests/e2e/workbench/default.spec.ts:193-194; playwright-report/index.html（AC-02/AC-03
        用例）
      result_status: pass
    - acceptance_id: SCN-01-COND-03
      expected: 来源为 stale（数据陈旧）或 unavailable（来源失败）时出现警告/错误色提示，呈现降级原因与受影响范围（图表/信号/提醒）。
      actual: '真实浏览器路径验证通过；本次交付整理时人工在浏览器中亲自复现：沙盒环境因未连接真实 FutuOpenD 网关，全部标的自然处于 unavailable
        态，主区顶部与标的详情区均出现琥珀色警告提示框，文案为「unavailable · FutuOpenD 行情不可用：Command failed:
        python3 .../futud-client.py ...」，MTS 卡同步显示「来源状态：unavailable · ...」与「数据不足，暂不输出
        MTS」，主图/成交量区显示「暂无主图数据」「暂无成交量数据」——受影响范围（图表、MTS 卡）清晰标注，与正常态形成对比。'
      reproduce_steps:
      - 执行 npm run dev，浏览器打开 http://localhost:5173
      - 若本地未连接 FutuOpenD 网关（或临时停止网关/断开网络），选择任意标的
      - 观察标的标题下方与图表上方：应出现琥珀色警告提示框，文案含「unavailable」或「stale」及具体原因
      - 观察主图/成交量/MTS 解释卡：应同步显示「暂无数据」「数据不足」等受影响提示，而非假装正常
      verify_command_evidence_id: CMD-E2E-T007A/CMD-E2E-T005A
      acceptance_result_evidence_path: 本次交付整理人工实测（2026-07-22，沙盒环境自然处于 unavailable
        态，见上方「关键结果证据」原文摘录）; tests/e2e/gate/consistency.spec.ts; tests/e2e/workbench/default.spec.ts
      result_status: pass
    - acceptance_id: SCN-01-COND-04
      expected: 应用启动读取快照后，restored（快照完好）/partial（旧存储迁移）/default_fallback（缺失/损坏/超限回退）三态均不渲染黄色警告横幅；restored
        呈中性/成功，partial/default_fallback 呈信息级。
      actual: 真实浏览器路径验证：三态逐一构造快照 fixture 驱动，DOM 断言均无 notice--warning 类；本次交付整理时人工实测：当前浏览器会话顶部恢复状态区显示「已恢复」（restored
        中性文字，无警告色）。
      reproduce_steps:
      - restored：正常使用应用后关闭标签页重新打开，顶部应显示「已恢复」，无黄色提示
      - partial：浏览器 DevTools → Console，执行 localStorage.removeItem('myinvestment.workspace.v2')
        后写入旧版键 localStorage.setItem('myinvestment.watchlist', JSON.stringify([{id:'AAPL',symbol:'AAPL',name:'Apple',market:'US',status:'active'}]))
        并刷新页面，顶部应显示「已从旧存储迁移」的信息级提示（非警告色）
      - default_fallback：DevTools → Console 执行 localStorage.clear() 后刷新页面（相当于全新访客首次打开），顶部应显示「已回退默认布局」的信息级提示（非警告色）
      verify_command_evidence_id: CMD-E2E-T006
      acceptance_result_evidence_path: 本次交付整理人工实测：当前会话顶部显示「已恢复」（截图见上方页面文本摘录）; tests/e2e/restore-layout/resume.spec.ts
      result_status: pass
    - acceptance_id: SCN-01-COND-05
      expected: restoreMetadata.status=failed 或存在被丢弃的坏布局（discardedLayoutKeys 非空）时，出现警告/需关注提示，与正常恢复态形成对比。
      actual: discardedLayoutKeys 非空路径已被真实 E2E 验证（构造坏布局 fixture 驱动，断言出现 notice--warning
        及「已丢弃坏布局」明细）；status=failed 这一具体枚举值经 execute/verify 两阶段确认在当前 src/domain/workspace.ts
        的真实恢复代码路径中没有可达分支产出（属既有代码结构限制，非本次改造引入），因此以等价单测（tests/unit/presentation/tone.spec.ts）覆盖该分支的纯函数正确性，未做浏览器层真实触发。
      reproduce_steps:
      - DevTools → Console：先正常使用应用一次以生成 localStorage['myinvestment.workspace.v2']，然后执行
        JSON 编辑将其中某个 layoutBySymbol 项改成缺少必需字段的非法对象（如 mode 写成不存在的枚举值），保存回 localStorage
        后刷新页面
      - 顶部恢复状态区应出现警告色提示，展开「技术详情」可见「已丢弃坏布局：具体标的代码」
      verify_command_evidence_id: CMD-E2E-T006/CMD-UNIT-01
      acceptance_result_evidence_path: tests/e2e/restore-layout/resume.spec.ts; tests/unit/presentation/tone.spec.ts:140-142;
        verification-report.md 「未覆盖范围」章节对 status=failed 结构性不可达的说明（DEV-01）
      result_status: pass
    - acceptance_id: SCN-01-COND-06
      expected: scoreBand 为 negative/strong_negative 或 alertLevel=风控 时，评分呈谨慎/风险语义色，且该色与来源
        stale/unavailable 的警告横幅物理区分（不同类名/视觉）。
      actual: 真实浏览器路径验证：negative 评分与 stale 来源在同一标的并置对比，caution 类与 warning 类互不相同，截图存档
        pt02-mts-negative-score-tone.png；tdd-reviewer 已用真实故障注入（把 caution 误改 warning）证明断言确实会捕获该类回归。
      reproduce_steps:
      - 找到当前技术面偏空（MTS 评分为负）的自选标的，或等待某标的评分转为负向
      - 查看该标的 MTS 解释卡：评分条与「技术提醒」文字应呈谨慎/风险色（如红色系），且与「来源不可用」的黄色警告横幅在视觉上明显不同
      - 对比同一或另一标的处于来源异常（stale/unavailable）时的黄色警告横幅，确认两种颜色不是同一套视觉语言
      verify_command_evidence_id: CMD-E2E-T002
      acceptance_result_evidence_path: harness-runtime/harness/artifacts/20260721-watchboard-ui-friendliness/evidence/pt02-mts-negative-score-tone.png;
        tests/e2e/mts/friendliness.spec.ts ("GAP-02")
      result_status: pass
    - acceptance_id: SCN-02-COND-01
