        裸字段前缀，也不出现如 TREND_ABOVE_EMA 等理由代码；改为人话文案。
      actual: 真实浏览器路径验证 + 本次人工实测：当前 unavailable 态下 MTS 卡主视图显示「数据不足，暂不输出 MTS」「数据不足」及一段人话说明，未见任何裸枚举字符串；「展开原始理由码」为独立可展开控件，默认收起。
      reproduce_steps:
