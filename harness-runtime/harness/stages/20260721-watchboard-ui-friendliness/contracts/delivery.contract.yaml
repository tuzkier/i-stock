      actual: 真实浏览器路径验证：进度条承载 DOM 存在；当前 unavailable 态因数据不足未渲染具体评分值，进度条组件在数据充足场景下的存在性已由既有
        E2E 断言确认。
      reproduce_steps:
      - 打开一个数据充足、MTS 已给出评分的标的
      - 在解释卡中应看到一条可视化进度条（而非仅一个数字），条的填充长度随评分高低变化
      verify_command_evidence_id: CMD-E2E-T002
      acceptance_result_evidence_path: tests/e2e/mts/card.spec.ts
      result_status: pass
    - acceptance_id: SCN-02-COND-03
