      - 点击「展开原始理由码」/「展开技术详情」，确认此时才出现原始枚举与代码
      verify_command_evidence_id: CMD-E2E-T002
      acceptance_result_evidence_path: 本次交付整理人工实测（2026-07-22，确认「展开原始理由码」控件默认收起）; tests/e2e/mts/card.spec.ts
      result_status: pass
    - acceptance_id: SCN-02-COND-04
