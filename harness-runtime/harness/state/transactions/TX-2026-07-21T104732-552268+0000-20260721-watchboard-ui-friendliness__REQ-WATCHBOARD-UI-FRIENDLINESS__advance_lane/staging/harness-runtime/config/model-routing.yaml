# HarnessV2 sub-agent model routing
# Exact model names are adapter/runtime specific. Public workflows must not
# hard-code model names; they resolve role -> candidates here.
#
# Fallback semantics (see rules/model-routing.md):
#   - Only triggers when ALL candidate models for a successfully-dispatched sub-agent
#     are unsupported by the runtime. It does NOT cover "named sub-agent cannot be
#     dispatched" — that case BLOCKs the workflow.
#   - Allowed values: null (no fallback — BLOCK), `default_model`, `main_agent`.
#   - Reviewer-class roles must NOT use `main_agent` fallback. Default global review
#     fallback is unset so review degradations always surface as BLOCKED.

current_adapter: auto

# Global fallback strategy. Set fallback: null on review to require BLOCK;
# execution defaults to main_agent for low-stakes engineering roles.
fallback:
  record_evidence: true

defaults:
  execution:
    fallback: main_agent
  review:
    fallback: null
    prefer_high_capability: true

adapters:
  codex:
    defaults:
      execution:
        candidates:
          - gpt-5.4-mini
          - gpt-5.3-codex
        fallback: main_agent
      review:
        candidates:
          - gpt-5.4
    roles:
      general-engineer:
        inherit: execution
      frontend-engineer:
        inherit: execution
      frontend-prototype-engineer:
        inherit: execution
      backend-engineer:
        inherit: execution
      client-engineer:
        inherit: execution
      security-engineer:
