      信号与提醒已补足 fixture_replay / 冻结样本口径；治理级别与外部行情依赖、金融提醒影响、算法不确定性和验证缺口相匹配，Work Graph
      与 contract 绑定一致，可进入下游阶段。
    coverage:
      objective: pass
      task_goal_fidelity: pass
      downstream_guesswork: pass
      invented_scope: pass
      success_definition: pass
      user_stories: pass
      scope: pass
