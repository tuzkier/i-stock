    description: 用户选中标的后看到主图、成交量和默认指标快照，并能从价格变化中读出趋势状态。
    related_roles:
    - 技术分析用户
  - kind: exception
    description: 行情源不可用或上游返回错误时，系统切到 demo fixture，并明确提示当前展示的是演示数据而不是实时行情。
