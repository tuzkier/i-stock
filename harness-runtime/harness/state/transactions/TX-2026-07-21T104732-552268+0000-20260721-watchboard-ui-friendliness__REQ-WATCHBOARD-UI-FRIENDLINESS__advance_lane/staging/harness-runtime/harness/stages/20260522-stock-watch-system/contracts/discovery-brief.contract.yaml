  - component: 图表布局与 Pane 选择
    autonomy: false
    runtime_context: false
    multi_step_reasoning: false
    uncertainty: true
    recommended: deterministic
  - component: 图表布局与Pane选择
    autonomy: false
    runtime_context: false
