$schema: "https://json-schema.org/draft/2020-12/schema"
type: object
required: [type, version, mission_id, stage, status, upstream, consumers]
properties:
  type:
    type: string
  subtype:
    type: string
  version:
    const: 1
  mission_id:
    type: string
    minLength: 1
  stage:
    type: string
    minLength: 1
  status:
    enum: [draft, ready, blocked]
  upstream:
    type: array
  consumers:
    type: array
  work_graph_artifact:
    type: object
    required:
      - node_id
      - artifact_version
      - promoted_by_mission
      - source_stage_artifact
      - canonical_artifact
    properties:
      node_id:
        type: string
        minLength: 1
      artifact_version:
        type: string
        minLength: 1
      promoted_by_mission:
        type: string
        minLength: 1
      source_stage_artifact:
        type: string
        minLength: 1
      canonical_artifact:
        type: string
        minLength: 1
additionalProperties: true
