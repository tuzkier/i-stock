$schema: "https://json-schema.org/draft/2020-12/schema"
allOf:
  - $ref: common.yaml
  - type: object
    required: [subtype, reviewers, findings]
    properties:
      type:
        const: evidence_contract
      subtype:
        const: review_evidence
      reviewers:
        type: array
        minItems: 1
      findings:
        type: array
      effectiveness_review:
        # code-review-improvement-plan M2-M4: round lifecycle tracking
        type: object
        properties:
          pending_reviewer_recheck:
            type: boolean
            description: "Set true by mark_pending_recheck hook after code edits; cleared when reviewer verdicts are accepted."
          rounds_used:
            type: integer
            minimum: 0
            description: "Number of completed review rounds (incremented by `harness contract add-round`)."
          rounds:
            type: array
            description: "Per-round verdict archive written by `harness contract add-round`."
      role_verdicts:
        type: array
        items:
          type: object
          required: [id, role, verdict, reviewed_obligations, review_basis, matrix, findings, blocking_gaps, non_blocking_risks]
          properties:
            id:
              type: string
            role:
              type: string
            verdict:
              enum: [PASS, HOLD, PASS_WITH_RISK, BLOCKED]
            reviewed_obligations:
              type: array
              minItems: 1
            review_basis:
              type: object
            matrix:
              type: array
            findings:
              type: array
            blocking_gaps:
              type: array
            non_blocking_risks:
              type: array
            dispatch:
              # M4.2 — Captures who actually executed the role and how. Required
              # for reviewer-class roles so the gate runner can refuse PASS
              # verdicts whose execution_mode degraded to main_agent_fallback
              # (main agent self-reviewing its own work).
              type: object
              required: [subagent_id, model, execution_mode, started_at, completed_at]
              properties:
                subagent_id:
                  type: string
                model:
                  type: string
                execution_mode:
                  enum: [spawn_agent, main_agent_fallback, sequential]
                started_at:
                  type: string
                  format: date-time
                completed_at:
                  type: string
                  format: date-time
      toolchain_probe:
        type: object
        required: [artifact, status, signals]
        properties:
          artifact:
            type: string
          status:
            enum: [PASS, WARN, FAIL]
          signals:
            type: array
      toolchain_status:
        type: object
        required: [plan_artifact, status_artifact, status]
        properties:
          plan_artifact:
            type: string
          run_artifact:
            type: string
          status_artifact:
            type: string
          status:
            enum: [PASS, WARN, FAIL, BLOCKED]
          missing_capabilities:
            type: array
          decision_gate_reasons:
            type: array
      e2e_status:
        type: object
        required: [plan_artifact, status_artifact, status]
        properties:
          plan_artifact:
            type: string
          run_artifact:
            type: string
          status_artifact:
            type: string
          status:
            enum: [PASS, WARN, FAIL, BLOCKED]
          missing_capabilities:
            type: array
          decision_gate_reasons:
            type: array
          artifacts:
            type: object
            properties:
              html_report:
                type: string
              trace:
                type: array
              video:
                type: array
              screenshots:
                type: array
              ui_diff:
                type: array
          flaky_signals:
            type: array
          skipped_tests:
            type: array
      tdd_review:
        type: object
        required: [verdict, role_boundary, adequacy_matrix, blocking_gaps, non_blocking_risks]
        properties:
          verdict:
            enum: [PASS, HOLD, PASS_WITH_RISK]
          probe_artifact:
            type: string
          toolchain_status_artifact:
            type: string
          toolchain_signal_handling:
            type: object
          role_boundary:
            type: object
          adequacy_matrix:
            type: array
          blocking_gaps:
            type: array
          non_blocking_risks:
            type: array
      e2e_review:
        type: object
        required: [verdict, methodology_ref, role_boundary, coverage_matrix, blocking_gaps, non_blocking_risks]
        properties:
          verdict:
            enum: [PASS, HOLD, PASS_WITH_RISK]
          methodology_ref:
            type: string
          e2e_status_artifact:
            type: string
          artifact_handling:
            type: object
          role_boundary:
            type: object
          coverage_matrix:
            type: array
            items:
              type: object
              required:
                - target
                - obligation_refs
                - e2e_test_refs
                - user_result_assertion
                - data_reality
                - negative_path
                - realtime_or_refresh
                - reliability
                - diagnostics
                - conclusion
              properties:
                target:
                  type: string
                obligation_refs:
                  type: array
                e2e_test_refs:
                  type: array
                user_result_assertion:
                  type: string
                data_reality:
                  type: string
                negative_path:
                  type: string
                realtime_or_refresh:
                  type: string
                reliability:
                  type: string
                diagnostics:
                  type: string
                conclusion:
                  type: string
          blocking_gaps:
            type: array
          non_blocking_risks:
            type: array
