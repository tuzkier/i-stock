$schema: "https://json-schema.org/draft/2020-12/schema"
allOf:
  - $ref: common.yaml
  - type: object
    required: [objective, user_stories, scope, acceptance_criteria, work_graph]
    properties:
      type:
        const: intent_contract
      acceptance_criteria:
        type: array
        minItems: 1
      user_stories:
        type: array
        minItems: 1
      work_graph:
        type: object
        required: [primary_nodes, operation, from_lane, to_lane]
        properties:
          primary_nodes:
            type: array
            minItems: 1
            items:
              type: string
          related_nodes:
            type: array
            items:
              type: string
          operation:
            type: string
          from_lane:
            type: string
          to_lane:
            type: string
          board:
            type: string
