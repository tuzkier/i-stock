  - target: control_contract.degradations
    op: set
    value:
      - kind: project_context_missing
        reason: "project-context.md 缺失，无法直接读取项目长期上下文。"
        compensating_action: "后续补 project-context 或用 project-knowledge/context/* 临时代替。"
      - kind: gitnexus_unavailable
        reason: "available=false indexed=false fresh=false，且当前没有 .gitnexus/。"
        compensating_action: "后续运行 npx gitnexus analyze；本次用手动代码搜索作为临时证据。"
