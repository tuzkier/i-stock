          task_id: TASK-STOCK-WATCH-T001
          execution_unit_id: T001-A2
          surfaces:
            - SURF-WATCHLIST
            - SURF-RESTORE
            - SURF-ALERTS
          primary_executors:
            - execute-control-plane-executor
          supporting_executors: []
