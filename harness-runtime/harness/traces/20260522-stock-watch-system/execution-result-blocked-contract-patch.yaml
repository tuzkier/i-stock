            - src/App.tsx
          depends_on:
            - T001-A1
          parallel_group: serial
          conflict_risk: high
          missing_surfaces:
            - src/App.tsx
          blocked: true
          blockers:
            - src/App.tsx is required to replace physical delete with archive/restore and surface row summaries but is outside the atomic write scope.
