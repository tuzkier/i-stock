    op: set
    value:
      - {id: RULE-01, source: BR-001, summary: 自选标的必须归属于已支持市场并保留原始代码与归一代码}
      - {id: RULE-02, source: BR-002, summary: 自选标的和提醒设置必须支持本地恢复}
      - {id: RULE-03, source: BR-003, summary: 市场对象不绑定单一行情来源}
      - {id: RULE-04, source: BR-004, summary: 数据不足时不得伪造指标或 MTS 结论}
      - {id: RULE-05, source: BR-005, summary: 演示或降级来源必须显式提示}
      - {id: RULE-06, source: BR-006, summary: 默认布局必须包含主图、成交量和一个可切换副图}
      - {id: RULE-07, source: BR-007, summary: 指标和 MTS 不得形成收益承诺}
      - {id: RULE-08, source: BR-008, summary: MTS 必须表达趋势状态、分数带、信号类型和提醒等级}
      - {id: RULE-09, source: BR-013, summary: 风控提醒优先于观察类提醒}
      - {id: RULE-10, source: BR-014, summary: Legacy composite signal 不得冒充正式 MTS}
