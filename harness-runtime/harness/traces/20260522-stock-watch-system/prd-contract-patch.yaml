          key_attributes: [time, open, high, low, close, volume, timeframe, source_mode]
          states: [sufficient, insufficient, live_or_formal, demo_fallback]
          relationships: [input_to IndicatorSet, input_to MtsSignal]
          rules: [RULE-04, RULE-05]
