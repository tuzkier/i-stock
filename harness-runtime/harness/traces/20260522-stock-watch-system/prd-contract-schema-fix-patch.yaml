  - target: control_contract.non_functional_requirements
    op: set
    value:
      - id: NFR-01
        category: 可解释性
        requirement: MTS 与提醒必须带结构化语义，不能退化成单一颜色或买卖词。
        metric: 页面可观察到趋势状态、分数带、信号类型、提醒等级、理由和失效条件。
        verification_method: BUC-04 / BUC-05 UI 检查与 fixture 回放。
      - id: NFR-02
        category: 连续性
        requirement: 同一浏览器配置内用户关闭后重开仍能继续使用核心配置。
        metric: 自选、提醒和基础看盘上下文可恢复。
        verification_method: 浏览器重开恢复验证。
      - id: NFR-03
        category: 降级透明性
        requirement: 来源降级或数据不足时必须显式提示。
        metric: 用户能区分正式、演示、降级和数据不足状态。
        verification_method: 降级场景截图和状态断言。
      - id: NFR-04
        category: 范围合规
        requirement: 产品不得输出收益承诺、自动交易动作或确定性投资建议。
        metric: 无下单、保证收益、胜率承诺等越界语义。
        verification_method: 内容审查与验收清单。
      - id: NFR-05
        category: 可替换性约束
        requirement: 下游方案必须优先评估成熟、维护活跃、许可合适的现成开源库。
        metric: 选型文档覆盖图表、指标、通知、数据接入候选比较。
        verification_method: solution / technical design 评审。
      - id: NFR-06
        category: 确定性
        requirement: 第一阶段 MTS 与提醒计算链路必须保持 deterministic。
        metric: 相同 fixture 输入产生相同 MTS 和提醒结果。
        verification_method: fixture / 回放样本验证。
