        traces_to: [D-07, FR-09, NFR-05, AC-01, AC-02, AC-03, AC-04, AC-05, VIZ-001]
  - target: control_contract.interface_changes
    op: set
    value:
      - id: INT-01
        kind: ADDED
        module: MOD-02
        name: MarketDataSource.fetchSeries
        before: "server/index.js 直接拼接 Yahoo fetch + fallback，没有显式边界。"
        after: "返回 MarketDataEnvelope，包含 priceSeries、sourceHealth、meta、servedAt、cacheState。"
        caller_impact: "Workbench、MTS、Alerts 只消费标准化结果。"
        error_semantics: "上游失败返回 unavailable / stale / demo_fallback，不把未包装异常抛给 UI。"
        compatibility: "保留 /api/chart/:symbol；迁移期保留 bars。"
        traces_to: [D-03, FR-06, AC-02]
      - id: INT-02
        kind: MODIFIED
        module: MOD-02
        name: ChartPayload_to_MarketDataEnvelope
        before: "ChartPayload 仅含 symbol/range/interval/meta/bars/dataSource/notice。"
        after: "新增 sourceHealth、priceSeries、degradationReason、sourceName、lastRefreshedAt、retryState，保留 bars。"
        caller_impact: "图表和 source banner 不再猜测 fallback 语义。"
        error_semantics: "新字段缺失时降级为 unavailable 并显示恢复提示。"
        compatibility: "双读：先读新字段，读不到再读旧 bars。"
        traces_to: [D-03, FR-06, AC-02, AC-03, AC-04]
      - id: INT-03
        kind: ADDED
        module: MOD-02
        name: SourceHealth
        after: "formal / demo_fallback / stale / unavailable，附 lastRefreshedAt、degradationReason、retryState、affectedObjects。"
        caller_impact: "SourceHealthPanel、Workbench、MTS、Alerts 一致展示降级。"
        error_semantics: "未知状态折叠为 unavailable，禁止映射成 formal。"
        compatibility: "从 dataSource + notice 迁移。"
        traces_to: [D-03, FR-06, RULE-10]
      - id: INT-04
        kind: REPLACED
        module: MOD-03
        name: PriceBar_to_PriceSeries
        before: "domain 与 UI 直接使用裸 PriceBar[]。"
        after: "PriceSeries 成为 canonical domain object，包含 bars、timeframe、latestOhlc、latestPrice、changeSummary、sourceHealth。"
        caller_impact: "指标、MTS、提醒、读数和回放统一消费 PriceSeries。"
        error_semantics: "bars 不足返回 partial / unavailable。"
        compatibility: "wire 层可继续传 bars，domain 层不直接依赖 PriceBar[]。"
        traces_to: [D-04, FR-03, FR-06, AC-02]
      - id: INT-05
        kind: REPLACED
        module: MOD-04
        name: CompositeSignal_to_MtsExplanation
        before: "buildSignal 输出旧四因子 CompositeSignal。"
        after: "MtsExplanation 包含 trendState、scoreBand、signalType、alertLevel、reasonCodes、invalidators、interpretability、sourceHealth。"
        caller_impact: "MtsSignalCard 只绑定解释对象，旧信号名称不得进入用户可见 surface。"
        error_semantics: "数据不足返回 data_insufficient；sourceHealth 非 formal 时暴露降级。"
        compatibility: "内部可复用旧四因子评分作为子分项。"
        traces_to: [D-04, D-05, FR-04, AC-03, AC-04]
      - id: INT-06
        kind: MODIFIED
        module: MOD-05
        name: AlertRule
        before: "仅 above/below 价格提醒或 signal 提醒，只有 enabled / lastTriggeredAt。"
        after: "增加 taxonomy、activationState、triggerState、history、acknowledgedAt、suspendedReason、restoreIntent。"
        caller_impact: "AlertsPanel、RestoreStatus、Workbench 渲染启停、触发、确认、归档恢复。"
        error_semantics: "无效条件阻断写入；归档状态不得触发；风控优先。"
        compatibility: "旧规则双读，读取后补默认 taxonomy。"
        traces_to: [D-05, FR-05, AC-04]
      - id: INT-07
        kind: ADDED
        module: MOD-06
        name: WorkspaceSnapshotV2
        after: "版本化快照包含 watchlist、alerts、selectedSymbol、layoutMode、selectedMobileTab、restoreMetadata。"
        caller_impact: "RestoreStatus、WatchlistPanel、LayoutController 共享恢复结果。"
        error_semantics: "快照损坏时回退默认 focus 布局并记录失败。"
        compatibility: "读取旧 key，写入 V2，保留迁移回退。"
        traces_to: [D-06, FR-07, FR-08, AC-05]
      - id: INT-08
        kind: MODIFIED
        module: MOD-06
        name: storage_api_to_workspace_api
        before: "readWatchlist/readAlerts/writeWatchlist/writeAlerts 简单 JSON 读写。"
        after: "readWorkspace/writeWorkspace/migrateWorkspace 负责双读旧 key、生成 V2、校验 schema、写入回退信息。"
        caller_impact: "本地恢复调用方只对 snapshot API 编程。"
        error_semantics: "解析失败返回 recoverable=false 的结果，不抛阻断异常。"
        compatibility: "至少一个发布周期内保留旧 key 读取逻辑。"
        traces_to: [D-02, D-06, FR-01, FR-07, FR-08, AC-01, AC-05]
  - target: control_contract.data_changes
    op: set
    value:
      - id: DATA-01
        kind: MODIFIED
        entity: SourceHealth
        migration: "从 dataSource + notice 迁移到 formal / demo_fallback / stale / unavailable；fallback 结果携带显式状态。"
        rollback: "未知状态回退为 unavailable；刷新失败保留上次可解释状态并给 retry 提示。"
        invariants:
          - "不得把 demo 当 formal。"
          - "stale 必须保留上次刷新时间。"
          - "affectedObjects 必须同步到图表/MTS/提醒。"
        traces_to: [FR-06, RULE-10, AC-02, AC-03, AC-04]
      - id: DATA-02
        kind: REPLACED
        entity: PriceSeries
        migration: "从 wire bars 生成 PriceSeries；保留原始 bars 仅用于适配层与回放。"
        rollback: "bars 不足、字段缺失或时间序列不连续时降级为 partial/unavailable。"
        invariants:
          - "同一 symbol/range/source 下可复算。"
          - "latestOhlc 与 changeSummary 必须可由 bars 推导。"
          - "provider 字段不得进入 domain。"
        traces_to: [FR-03, FR-06, BUC-02, BUC-03, BO-003, BO-004]
      - id: DATA-03
        kind: REPLACED
        entity: MtsExplanation
        migration: "旧四因子评分可作为内部子分项；UI、fixture 与 snapshot 只认 MtsExplanation。"
        rollback: "评分不足或来源降级时输出 data_insufficient。"
        invariants:
          - "reasonCodes 与 invalidators 不能同时为空。"
          - "alertLevel 只能落在观察/确认/强信号/风控。"
          - "禁止收益承诺措辞。"
        traces_to: [FR-04, RULE-05, RULE-06, AC-03, AC-04]
      - id: DATA-04
        kind: ADDED
        entity: WorkspaceSnapshotV2
        migration: "从 myinvestment.watchlist / myinvestment.alerts 双 key 迁移到版本化 snapshot。"
        rollback: "读取失败时回退默认 focus 布局并重建可用工作台。"
        invariants:
          - "版本号必填。"
          - "archived 标的必须可恢复。"
          - "snapshot 不能隐式丢失触发历史。"
        traces_to: [FR-07, FR-08, AC-05, RULE-12]
      - id: DATA-05
        kind: MODIFIED
        entity: WatchSymbolArchiveState
        migration: "从删除即消失迁移到 active/archived；归档暂停绑定提醒。"
        rollback: "回退时保留 archived 条目，至少恢复为只读状态。"
        invariants:
          - "同 identity 的 active 不能重复。"
          - "archived 标的可恢复。"
          - "归档期间绑定提醒状态为 suspended_by_archive。"
        traces_to: [FR-01, FR-02, FR-07, BUC-01, BUC-07, RULE-09]
      - id: DATA-06
        kind: MODIFIED
        entity: AlertTaxonomyHistoryTriggerState
        migration: "从 above/below + signal + enabled/lastTriggeredAt 迁移到 taxonomy、activationState、triggerState、history、acknowledged、suspended_by_archive。"
        rollback: "旧提醒按默认 taxonomy 和状态补全；历史缺失时以无历史但可继续使用回退。"
        invariants:
          - "风控优先于观察。"
          - "suspended_by_archive 不得触发。"
          - "触发历史必须可追踪，确认与触发分离。"
        traces_to: [FR-05, AC-04, BUC-05, BUC-06, BUC-07]
  - target: control_contract.verification_strategy
    op: set
    value:
