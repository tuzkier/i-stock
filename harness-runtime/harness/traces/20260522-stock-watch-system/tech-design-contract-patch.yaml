      - id: VS-05
        layer: integration
        target_ids: [MOD-06, INT-07, INT-08, DATA-04, DATA-05, DATA-06, FR-07, FR-08, AC-05]
        evidence_required: [localstorage_migration_result, corrupted_snapshot_result]
      - id: VS-06
        layer: e2e
        target_ids: [MOD-07, INT-02, INT-07, FR-02, FR-03, FR-04, FR-05, FR-06, FR-07, FR-08]
        evidence_required: [playwright_user_journey_result, locator_contract_result]
      - id: VS-07
        layer: gate
        target_ids: [MOD-08, FR-09, NFR-05]
        evidence_required: [unit_result, replay_result, e2e_result, build_result]
      - id: VS-08
        layer: fitness
        target_ids: [MOD-02, MOD-03, D-03, D-01]
        evidence_required: [cache_boundary_check, chart_render_check]
  - target: control_contract.architectural_fitness_functions
    op: set
    value:
      - id: AFF-01
        protected_quality: provider_agnostic_domain
        measurement: "domain objects 与 WorkspaceSnapshot 不含 provider-specific auth/quota/response schema 字段。"
        threshold: "0 provider-specific 字段进入 WatchSymbol / PriceSeries / AlertRule / WorkspaceSnapshot。"
        verification_evidence: [VS-01, VS-02]
      - id: AFF-02
        protected_quality: local_recovery_integrity
        measurement: "legacy key、V2 snapshot、损坏 snapshot、大体量 fixture 均可给出明确恢复结果。"
        threshold: "无静默数据丢失；失败时 UI 显示恢复状态。"
        verification_evidence: [VS-05]
      - id: AFF-03
        protected_quality: deterministic_signal_explanation
        measurement: "同一 fixture 回放得到同一 MtsExplanation，且 reasonCodes/invalidators 可解释。"
        threshold: "replay 结果稳定；数据不足显式为 data_insufficient。"
        verification_evidence: [VS-03]
  - target: control_contract.production_readiness
    op: set
    value:
      error_handling: "行情失败以 SourceHealth 和降级文案呈现；MTS 数据不足输出 data_insufficient；本地恢复失败回退默认 focus 布局；提醒校验失败阻断写入并显示原因。"
      compatibility: "ChartPayload 过渡期保留 bars；legacy watchlist/alerts key 可读；旧四因子评分仅可内部复用，不能作为用户可见正式 MTS 名称。"
      observability: "后端记录 upstream 成功/失败、fallback 原因与 cache 状态；前端展示 SourceHealth、恢复结果、提醒触发理由和降级状态；fixture 名称可定位 AC/FR。"
      rollback: "snapshot 迁移失败不清空旧 key；provider 失败切到显式 demo_fallback；图表库不满足合同则降级到读数摘要并走 Chart Gate；cache 影响恢复或 stale 语义时停用并重审。"
  - target: control_contract.agent_implementation
    op: set
    value: []
