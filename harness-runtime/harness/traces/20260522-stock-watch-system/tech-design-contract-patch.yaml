      - id: VS-03
        layer: unit
        target_ids: [MOD-04, INT-05, DATA-03, FR-04, AC-03]
        evidence_required: [mts_replay_determinism_result]
      - id: VS-04
        layer: integration
        target_ids: [MOD-05, INT-06, DATA-05, DATA-06, FR-05, FR-07, AC-04, AC-05]
