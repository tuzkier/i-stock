patches:
  - target: control_contract.interface_changes
    op: set
    value:
      - id: INT-01
        kind: ADDED
        module: MOD-02
        name: MarketDataSource.fetchSeries
        after: "返回 MarketDataEnvelope，包含 priceSeries、sourceHealth、meta、servedAt、cacheState。server-side 内存 cache key 为 normalizedSymbol + range + interval + provider，TTL 60 秒，forceRefresh 必须 bypass。"
        traces_to: [FR-06, AC-02]
      - id: INT-02
        kind: MODIFIED
        module: MOD-02
        name: ChartPayload_to_MarketDataEnvelope
        before: "ChartPayload 仅含 symbol/range/interval/meta/bars/dataSource/notice。"
        after: "新增 sourceHealth、priceSeries、degradationReason、sourceName、lastRefreshedAt、retryState、cacheState，保留 bars；cacheState 只允许 miss/hit/bypass/stale_fallback/disabled。"
        traces_to: [FR-06, AC-02, AC-03, AC-04]
      - id: INT-03
        kind: ADDED
        module: MOD-02
        name: SourceHealth
        after: "formal / demo_fallback / stale / unavailable，附 lastRefreshedAt、degradationReason、retryState、affectedObjects。"
        traces_to: [FR-06]
      - id: INT-04
        kind: MODIFIED
        module: MOD-03
        name: PriceBar_to_PriceSeries
        before: "domain 与 UI 直接使用裸 PriceBar[]。"
        after: "PriceSeries 成为 canonical domain object，包含 bars、timeframe、latestOhlc、latestPrice、changeSummary、sourceHealth。"
        traces_to: [FR-03, FR-06, AC-02]
      - id: INT-05
        kind: MODIFIED
        module: MOD-04
        name: CompositeSignal_to_MtsExplanation
        before: "buildSignal 输出旧四因子 CompositeSignal。"
        after: "MtsExplanation 包含 trendState、scoreBand、signalType、alertLevel、reasonCodes、invalidators、interpretability、sourceHealth、registryVersion；reasonCodes 与 invalidators 必须引用 MtsReasonRegistry。"
        traces_to: [FR-04, AC-03, AC-04]
      - id: INT-06
        kind: MODIFIED
        module: MOD-05
        name: AlertRule
        before: "仅 above/below 价格提醒或 signal 提醒，只有 enabled / lastTriggeredAt。"
        after: "增加 taxonomy、activationState、triggerState、history、acknowledgedAt、suspendedReason、restoreIntent。"
        traces_to: [FR-05, AC-04]
      - id: INT-07
        kind: ADDED
        module: MOD-06
        name: WorkspaceSnapshotV2
        after: "版本化快照包含 watchlist、alerts、selectedSymbol、layoutBySymbol、globalLayoutFallback、selectedMobileTab、restoreMetadata；layoutBySymbol[normalizedSymbol] 保存 layout_scope=symbol 的 layoutMode、副图偏好、最近 range 与折叠状态。"
        traces_to: [FR-07, FR-08, AC-05]
      - id: INT-08
        kind: MODIFIED
        module: MOD-06
        name: storage_api_to_workspace_api
        before: "readWatchlist/readAlerts/writeWatchlist/writeAlerts 简单 JSON 读写。"
        after: "readWorkspace/writeWorkspace/migrateWorkspace 负责双读旧 key、生成 V2、校验 schema、写入回退信息。"
        traces_to: [FR-01, FR-07, FR-08, AC-01, AC-05]
  - target: control_contract.data_changes
    op: set
    value:
      - id: DATA-01
        kind: MODIFIED
        entity: SourceHealth
        migration: "从 dataSource + notice 迁移到 formal / demo_fallback / stale / unavailable；fallback 结果携带显式状态。"
        rollback: "未知状态回退为 unavailable；刷新失败保留上次可解释状态并给 retry 提示。"
        traces_to: [FR-06, AC-02, AC-03, AC-04]
      - id: DATA-02
        kind: MODIFIED
        entity: PriceSeries
        migration: "从 wire bars 生成 PriceSeries；保留原始 bars 仅用于适配层与回放。"
        rollback: "bars 不足、字段缺失或时间序列不连续时降级为 partial/unavailable。"
        traces_to: [FR-03, FR-06, AC-02]
      - id: DATA-03
        kind: MODIFIED
        entity: MtsExplanationAndReasonRegistry
        migration: "旧四因子评分可作为内部子分项；新增 MtsReasonRegistry 作为 reason/invalidator 唯一字典。"
        rollback: "评分不足或来源降级时输出 data_insufficient；未知 code 降级为 UNKNOWN_CODE。"
        traces_to: [FR-04, AC-03, AC-04]
      - id: DATA-04
        kind: ADDED
        entity: WorkspaceSnapshotV2AndChartLayoutPreference
        migration: "从 myinvestment.watchlist / myinvestment.alerts 双 key 迁移到版本化 snapshot，补入 layoutBySymbol 与 global fallback。"
        rollback: "读取失败时回退默认 focus 布局；标的级布局损坏时只回退该标的布局，不丢 watchlist/alerts。"
        traces_to: [FR-07, FR-08, AC-05]
      - id: DATA-05
        kind: MODIFIED
        entity: WatchSymbolArchiveState
        migration: "从删除即消失迁移到 active/archived；归档暂停绑定提醒。"
        rollback: "回退时保留 archived 条目，至少恢复为只读状态。"
        traces_to: [FR-01, FR-02, FR-07, AC-01, AC-05]
      - id: DATA-06
        kind: MODIFIED
        entity: AlertTaxonomyHistoryTriggerState
        migration: "从 above/below + signal + enabled/lastTriggeredAt 迁移到 taxonomy、activationState、triggerState、history、acknowledged、suspended_by_archive。"
        rollback: "旧提醒按默认 taxonomy 和状态补全；历史缺失时以无历史但可继续使用回退。"
        traces_to: [FR-05, AC-04, AC-05]
  - target: control_contract.verification_strategy
    op: set
    value:
      - id: VS-01
        layer: integration
        target_ids: [MOD-02, FR-06, AC-02]
        evidence_required: [live_smoke_result, mock_failure_result, fallback_fixture_result]
      - id: VS-02
        layer: replay
        target_ids: [MOD-02, MOD-03, MOD-04, MOD-05, FR-06, AC-03, AC-04]
        evidence_required: [source_health_fixture_replay]
      - id: VS-03
        layer: unit
        target_ids: [MOD-04, FR-04, AC-03]
        evidence_required: [mts_replay_determinism_result, mts_registry_code_coverage]
      - id: VS-04
        layer: integration
        target_ids: [MOD-05, FR-05, FR-07, AC-04, AC-05]
        evidence_required: [alert_archive_restore_result]
      - id: VS-05
        layer: integration
        target_ids: [MOD-06, FR-07, FR-08, AC-05]
        evidence_required: [localstorage_migration_result, corrupted_snapshot_result, symbol_layout_restore_result, large_snapshot_threshold_result]
      - id: VS-06
        layer: e2e
        target_ids: [MOD-07, FR-02, FR-03, FR-04, FR-05, FR-06, FR-07, FR-08]
        evidence_required: [playwright_user_journey_result, locator_contract_result, per_symbol_layout_e2e_result]
      - id: VS-07
        layer: gate
        target_ids: [MOD-08, FR-09, NFR-05]
        evidence_required: [unit_result, replay_result, e2e_result, build_result]
      - id: VS-08
        layer: fitness
        target_ids: [MOD-02, MOD-03]
        evidence_required: [cache_ttl_key_bypass_stale_check, chart_render_check]
  - target: control_contract.decision_gates
    op: set
    value:
      - id: Provider Gate
        owner_stage: technical_analysis / execute / verify
        failure_mode: "provider-specific auth/quota/response schema 渗透进 WatchSymbol、PriceSeries、AlertRule 或 WorkspaceSnapshot。"
        blocking_threshold: "任一 provider-specific 字段进入领域对象或持久化 schema；fake provider fixture 无法通过同一 domain contract。"
        required_evidence: [yahoo_fixture, demo_fixture, fake_provider_fixture, schema_scan, AFF-01]
      - id: Cache Gate
        owner_stage: technical_analysis / execute / verify
        failure_mode: "cache 被当成本地恢复存储，或 stale 语义无法解释。"
        blocking_threshold: "cache 需要持久化、跨重启、跨 provider 复用，或 stale 服务超过 15 分钟；显式刷新无法绕过 cache。"
        required_evidence: [ttl_60s_hit_miss, force_refresh_bypass, range_provider_invalidation, upstream_failure_stale_fixture, VS-08]
      - id: Storage Gate
        owner_stage: technical_analysis / execute / verify
        failure_mode: "WorkspaceSnapshotV2 无法在 localStorage 内可靠迁移、保存或恢复。"
        blocking_threshold: "500 个标的 + 2000 条 alert history fixture 超过 2 MB；单次读写/迁移超过 500 ms；legacy/corrupt fixture 造成 watchlist/alerts 静默丢失。"
        required_evidence: [legacy_key_fixture, corrupt_snapshot_fixture, large_snapshot_fixture, browser_reopen_restore, VS-05]
      - id: Chart Gate
        owner_stage: execute / verify
        failure_mode: "lightweight-charts 无法稳定承载主图、成交量、副图与 locator contract。"
        blocking_threshold: "主图/成交量/副图任一 pane 无法在 fixture e2e 稳定渲染，或 locator 不能绑定用户可见状态。"
        required_evidence: [chart_fixture_screenshot, playwright_locator_assertion, fallback_readout_evidence, VS-06, VS-08]
  - target: control_contract.cache_contract
    op: set
    value:
      owner: server-side MarketDataSource memory cache
      key: normalizedSymbol + range + interval + provider
      ttl_seconds: 60
      stale_max_minutes: 15
      allowed_states: [miss, hit, bypass, stale_fallback, disabled]
      invalidation: [forceRefresh, range_change, provider_change, ttl_expired]
      forbidden: [localStorage_persistence, cross_restart_restore, provider_specific_domain_fields]
  - target: control_contract.workspace_layout_contract
    op: set
    value:
      snapshot_version: 2
      layout_scope: [symbol, global_fallback]
      per_symbol_key: normalizedSymbol
      fields: [layoutMode, secondaryPanePreference, range, collapsedSections, updatedAt]
      restore_status: [restored, partial, default_fallback, failed]
      fallback_rule: "标的级布局缺失或损坏时只回退该标的到 globalLayoutFallback/default focus，不清空 watchlist/alerts。"
  - target: control_contract.mts_reason_registry
    op: set
    value:
      version: mts-registry-v1
      code_shape: UPPER_SNAKE_CASE
      categories: [trend, momentum, volatility, volume, risk, source, data_quality]
      required_entry_fields: [id, kind, category, severityHint, displayKey, introducedIn, deprecated]
      compatibility: "已发布 code 不删除，只能 deprecated；未知 code 降级为 UNKNOWN_CODE。"
