  - id: result-t003-mts
    acceptance_id: AC-03
    kind: dom_snapshot
    evidence_role: primary
    expected: MTS card exposes structured fields and non-advice copy; unavailable source degrades MTS.
    actual: Playwright MTS card tests passed; unit/replay matrix passed.
    reproduce: Run bundled unit/replay matrix and full E2E command.
    artifact: harness-runtime/harness/stages/20260522-stock-watch-system/traces/cmd/cmd-e2e-2026-06-07-05-47-19.json
    result: pass
  - id: result-t004-alerts
    acceptance_id: AC-04
    kind: dom_snapshot
    evidence_role: primary
    expected: Alert rules can be created, triggered, acknowledged, suspended by archive, and scheduled missed is recorded without backfilling trigger.
    actual: Alerts panel E2E paths passed; unit/replay matrix passed.
    reproduce: Run bundled unit/replay matrix and full E2E command.
    artifact: harness-runtime/harness/stages/20260522-stock-watch-system/traces/cmd/cmd-e2e-2026-06-07-05-47-19.json
    result: pass
  - id: result-t005-restore
    acceptance_id: AC-05
    kind: dom_snapshot
    evidence_role: primary
    expected: Browser reload restores selectedSymbol, alerts, per-symbol dense layout, mobile tab, and corrupt layout fallback remains usable.
    actual: Restore-layout E2E paths passed; unit/replay matrix passed.
    reproduce: Run bundled unit/replay matrix and full E2E command.
    artifact: harness-runtime/harness/stages/20260522-stock-watch-system/traces/cmd/cmd-e2e-2026-06-07-05-47-19.json
    result: pass
  - id: result-t006-gate
