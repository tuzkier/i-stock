    op: set
    value:
      - id: RESULT-NORMALIZE-001
        required_evidence_id: re-T001-1
        ac: AC-01
        kind: dom
        evidence_role: primary
        expected: 支持市场代码添加前显示市场、原始代码和归一代码，确认后进入 active 自选。
        actual: E2E 港股输入 9988 显示“港股 · 9988 → 9988.HK”，确认后 9988.HK 回到 active；unit 覆盖 HK/CN/KR 归一。
        reproduce: Run npm run test:e2e and inspect tests/e2e/watchlist/t001-watchlist-archive-restore.spec.ts archive/restore flow.
        artifact: tests/e2e/watchlist/t001-watchlist-archive-restore.spec.ts
        result: pass
      - id: RESULT-AMBIGUITY-001
        required_evidence_id: re-T001-1
        ac: AC-01
        kind: dom
        evidence_role: primary
        expected: 美股 tab 输入纯数字 0700 时不写入 active，并显示需要确认市场的状态。
        actual: E2E 断言歧义文案可见、确认按钮 disabled，localStorage 不包含 0700.HK。
        reproduce: Run npm run test:e2e and inspect test “歧义数字输入不会写入 active 自选”.
        artifact: harness-runtime/harness/stages/20260522-stock-watch-system/traces/cmd/cmd-e2e-2026-05-24-01-33-03.json
        result: pass
      - id: RESULT-SUMMARY-001
        required_evidence_id: re-T001-3
        ac: AC-01
        kind: dom
        evidence_role: primary
        expected: 自选列表展示市场、归一代码、来源状态、最近价和涨跌摘要。
        actual: E2E 断言 9988.HK 行展示“正式 · 190.00 · 5.56%”；browser walkthrough 记录 demo fallback 下多行摘要。
        reproduce: Run npm run test:e2e; optional manual evidence in browser-walkthrough.md.
        artifact: harness-runtime/harness/traces/20260522-stock-watch-system/browser-walkthrough.md
        result: pass
      - id: RESULT-ARCHIVE-001
        required_evidence_id: re-T001-2
        ac: AC-05
        kind: dom
        evidence_role: primary
        expected: 归档 active 标的时标的变为 archived，绑定 enabled 提醒进入 suspended_by_archive 且不触发。
        actual: E2E localStorage assertion equals archived/suspended_by_archive/enabled=false; unit archive tests pass.
        reproduce: Run npm run test:e2e and node --test unit-build watchlist specs.
        artifact: harness-runtime/harness/stages/20260522-stock-watch-system/traces/cmd/cmd-e2e-2026-05-24-01-33-03.json
        result: pass
      - id: RESULT-RESTORE-001
        required_evidence_id: re-T001-2
        ac: AC-05
        kind: dom
        evidence_role: primary
        expected: 重新加入已归档同 identity 标的时恢复 active，并恢复提醒启停意图；reload 后仍保留。
        actual: E2E 断言 archived 行消失、9988.HK 回到 active、strong-sell checkbox checked；reload 后仍 checked。
        reproduce: Run npm run test:e2e and inspect archive/restore flow.
        artifact: harness-runtime/harness/stages/20260522-stock-watch-system/traces/cmd/cmd-e2e-2026-05-24-01-33-03.json
        result: pass
      - id: RESULT-MUTATION-001
        required_evidence_id: re-T001-4
        ac: AC-01
        kind: file
        evidence_role: cross_check
        expected: 删除歧义门禁或把 suspended_by_archive 退化为 disabled 时测试失败。
        actual: mutation-report.md 记录两类 targeted mutation 均失败。
        reproduce: Read mutation-report.md.
        artifact: harness-runtime/harness/traces/20260522-stock-watch-system/mutation-report.md
        result: pass
      - id: RESULT-A11Y-001
        required_evidence_id: re-T001-3
        ac: AC-01
        kind: accessibility_snapshot
        evidence_role: auxiliary
        expected: T001 看盘主流程无自动化可访问性严重违规。
        actual: Playwright axe smoke test passed.
        reproduce: Run npm run test:e2e.
        artifact: tests/e2e/watchlist/t001-watchlist-archive-restore.spec.ts
        result: pass
