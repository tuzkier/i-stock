control_contract:
  type: delivery_contract
  version: 1
  mission_id: "{{mission_id}}"
  stage: delivery
  artifact: delivery

  acceptance_result:
    mission_id: "{{mission_id}}"
    stage: delivery
    artifact: acceptance-result
    delivery_entry:
      - type: "{{entry_type}}"         # url | api | cli | test_account | branch_commit
        url_or_command: "{{url_or_command}}"
        credential_or_fixture_ref: null
        commit_or_branch: "{{commit_or_branch}}"
    acceptance_trace:
      - acceptance_id: SCN-01
        expected: "{{expected_result}}"
        actual: "{{actual_observed_result}}"
        reproduce_steps:
          - "{{step_1}}"
          - "{{step_2}}"
        verify_command_evidence_id: "CMD-001"
        acceptance_result_evidence_path: "{{evidence_path}}"
        result_status: "pass"   # pass | fail | accepted_risk | blocked
    risk_acceptance: []
    user_checkpoint:
      status: pending_user_acceptance   # pending_user_acceptance | approved | accepted_risk | continue_fix | blocked
      approval_id: null
      original_user_text_ref: null
      risk_summary: null

  delivery_package:
    acceptance_state_ref: null  # required: path + checksum of acceptance-result contract
    scope_summary: "{{one_line_scope_summary}}"
    evidence_links:
      - "harness-runtime/harness/artifacts/{{mission_id}}/verify/acceptance-result.md"
      - "harness-runtime/harness/artifacts/{{mission_id}}/verify/verification-report.md"
      - "harness-runtime/harness/artifacts/{{mission_id}}/code-review/code-review.md"
    known_gaps: []
    follow_ups: []
    # follow_up example:
    # - id: FU-001
    #   description: "{{follow_up_description}}"
    #   severity: blocking   # blocking | advisory | can_ignore
    #   graph_op: split_node   # split_node | defer_node | block_node | none
    #   none_reason: null    # required only when graph_op == none and severity == can_ignore
    handoff_evidence:
      pause_required: true
      delivery_gate_report_path: null
      approval_id: null
      next_stage_candidate: finishing-branch
      requires_user_resume: true
    dora_signals:
      lead_time: "{{mission_lead_time}}"
      rework_count: 0
      review_hold_count: 0
      verification_failure_count: 0
      rollback_followup_count: 0

  dispatches: []
  # dispatch example:
  # - role: release-readiness-expert
  #   execution_mode: subagent
  #   model: "{{model_id}}"
  #   started_at: "{{started_at}}"
  #   completed_at: "{{completed_at}}"
  #   verdict: PASS
