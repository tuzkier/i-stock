control_contract:
  type: intent_contract
  version: 2
  mission_id: "{{mission_id}}"
  stage: intake
  status: ready
  upstream: []
  consumers:
    - discovery
    - prd
    - solution
    - technical_analysis
    - breakdown
    - verify
    - delivery
    - stage-gate
  objective:
    id: OBJ-001
    statement: "{{objective_short_statement}}"
  intake_decision:
    confirmed: true
    confirmation_source: "{{intake_confirmation_source}}"
    confirmed_at_or_turn: "{{intake_confirmed_at_or_turn}}"
  intent_role_analysis:
    actual_task_goal: "{{actual_task_goal}}"
    source_materials:
      - "{{source_material_1}}"
    agent_instructions:
      - "{{agent_instruction_1}}"
    process_constraints:
      - "{{process_constraint_1}}"
    discussion_outputs:
      - "{{discussion_output_1}}"
    corrections:
      - "{{correction_1}}"
    execution_confirmation: "{{intake_confirmation_source}}"
    excluded_from_objective:
      - source: "{{excluded_source_1}}"
        reason: "{{excluded_reason_1}}"
    open_intent_gaps:
      # 任务接入阶段（intake）这里只记录未解决的探索型问题。
      # 若缺口阻断目标、交付物或验收口径确认，必须回到接入决策，
      # 不得交给探索阶段（discovery）猜测。
      # 分流方法：先判定是否阻断目标 / 交付物 / 范围 / 验收口径；
      # 阻断型缺口回任务接入决策，探索型缺口才写入本数组。
      # 约定模板：因为 <来源> 暴露了 <问题>，它可能影响 <影响对象>；
      # 探索阶段需要查明 <待查事实>；停止边界是 <不得替代完成的下游工作>。
      - id: GAP-01
        question: "{{open_intent_question_1}}"
        source: "{{open_intent_source_1}}"
        impact: "{{open_intent_impact_1}}"
        handoff_stage: discovery
        reason_for_discovery: "{{open_intent_discovery_reason_1}}"
        boundary: "仅作为探索阶段（discovery）输入；不得在任务接入阶段（intake）改写为目标、范围、验收项或业务对象模型结论"
  task_goal_fidelity:
    objective_source: actual_task_goal
    deliverables_source: actual_task_goal
    acceptance_scenarios_source: actual_task_goal
    work_graph_title_source: actual_task_goal
    reviewer_notes: ""
  success_definition:
    desired_effect: "{{desired_effect}}"
    deliverables:
      - id: DEL-01
        name: "{{primary_deliverable}}"
        format: "{{delivery_format}}"
        acceptance_link:
          acceptance:
            - SCN-01
    validation_evidence:
      - id: EVD-01
        type: "{{evidence_type}}" # test | command | screenshot | demo | review | manual_acceptance | document
        method: "{{validation_method}}"
        proves:
          acceptance:
            - SCN-01
    non_goals:
      - "{{non_goal_1}}"
  user_stories:
    - id: US-01
      role: "{{user_role_1}}"
      goal: "{{user_goal_1}}"
      value: "{{user_value_1}}"
      story_context:
        user: "{{story_user_1}}"
        problem: "{{story_problem_1}}"
        scenario: "{{story_scenario_1}}"
        value: "{{story_value_1}}"
        success_metrics:
          - id: SM-01
            signal: "{{story_success_signal_1}}"
            target: "{{story_success_target_1}}"
      traces_to:
        acceptance:
          - SCN-01
    - id: US-02
      role: "{{user_role_2}}"
      goal: "{{user_goal_2}}"
      value: "{{user_value_2}}"
      story_context:
        user: "{{story_user_2}}"
        problem: "{{story_problem_2}}"
        scenario: "{{story_scenario_2}}"
        value: "{{story_value_2}}"
        success_metrics:
          - id: SM-02
            signal: "{{story_success_signal_2}}"
            target: "{{story_success_target_2}}"
      traces_to:
        acceptance:
          - SCN-02
  scope:
    in:
      - id: SCOPE-IN-001
        statement: "{{scope_in_item_1}}"
    out:
      - id: SCOPE-OUT-001
        statement: "{{scope_out_1}}"
        reason: "{{reason_1}}"
  acceptance_scenarios:
    # 验收场景 / 条件必须有 id + statement，再加下面之一：
    #   (a) given / when / then（前置-动作-结果格式），三者都要顶层字段，**不要写成 gwt: {...}**
    #   (b) verification_method（无法用前置-动作-结果描述时的兜底，写一句可执行的验证方法）
    - id: SCN-01
      statement: "任务完成后系统必须支持的行为"
      given: "动作发生前可观察的前置条件"
      when: "用户可见的动作或触发条件"
      then: "证明该行为成立的可观察结果"
      verification_required: true
    - id: SCN-02
      statement: "无法用前置-动作-结果描述、但需要明确验证方法的验收标准"
      verification_method: "运行 scripts/verify-foo.sh，并确认退出码为 0，且输出包含预期行 'OK'"
      verification_required: true
  autonomy:
    level: "{{autonomy_level}}"
    governance_risk: "{{governance_risk}}" # low | medium | high
    governance_assessment:
      hard_triggers:
        # 任何非空硬触发项都会使 governance_risk=high / autonomy.level=受控推进，除非已记录用户风险接受。
        - id: "{{hard_trigger_id}}"
          category: "{{hard_trigger_category}}" # security | data | external_dependency | product_decision | agent_authority | verification_gap
          rationale: "{{hard_trigger_rationale}}"
      dimensions:
        decision_authority:
          level: "{{decision_authority_risk}}" # low | medium | high
          rationale: "{{decision_authority_rationale}}"
        reversibility:
          level: "{{reversibility_risk}}"
          rationale: "{{reversibility_rationale}}"
        blast_radius:
          level: "{{blast_radius_risk}}"
          rationale: "{{blast_radius_rationale}}"
        verification_reliability:
          level: "{{verification_reliability_risk}}"
          rationale: "{{verification_reliability_rationale}}"
        data_permission:
          level: "{{data_permission_risk}}"
          rationale: "{{data_permission_rationale}}"
        external_dependency:
          level: "{{external_dependency_risk}}"
          rationale: "{{external_dependency_rationale}}"
        agent_authority:
          level: "{{agent_authority_risk}}"
          rationale: "{{agent_authority_rationale}}"
        uncertainty:
          level: "{{uncertainty_risk}}"
          rationale: "{{uncertainty_rationale}}"
      scale_signals:
        change_surface:
          level: "{{change_surface_signal}}"
          rationale: "{{change_surface_rationale}}"
        user_roles:
          level: "{{user_roles_signal}}"
          rationale: "{{user_roles_rationale}}"
        module_span:
          level: "{{module_span_signal}}"
          rationale: "{{module_span_rationale}}"
      decision_rule: "{{governance_decision_rule}}"
      user_confirmation_required: true
      downgrade_or_checkpoint_removal_requires_approval: true
    skippable_stages: []
    reviewer_pass_sufficient: []
    human_checkpoints: []
    escalation_triggers:
      - scope_change
      - new_external_dependency
      - high_risk_change
  work_graph:
    primary_nodes:
      - "{{primary_work_graph_node}}"
    related_nodes: []
    operation: "{{work_graph_operation}}"
    from_lane: "{{work_graph_from_lane}}"
    to_lane: "{{work_graph_to_lane}}"
    board: "harness-runtime/harness/work-graph/boards/main.yaml"
  role_policy:
    stage: intake
    required_execution_roles:
      - mission-framing-expert
    required_review_roles:
      - mission-contract-effectiveness-reviewer
    conditional_roles: []
  execution_result:
    id: EXE-INTAKE-001
    role: mission-framing-expert
    status: DONE
    produced_artifacts:
      - path: "harness-runtime/harness/missions/{{mission_id}}/mission-contract.md"
        work_graph_node: "{{primary_work_graph_node}}"
    fulfilled_obligations: []
    decision_log: []
    traceability_matrix: []
    evidence_refs: []
    open_questions: []
    concerns: []
  obligations:
    - id: OBL-INTAKE-001
      mission_id: "{{mission_id}}"
      type: correctness
      risk: medium
      traces_to:
        acceptance:
          - SCN-01
          - SCN-02
        task: []
      required_evidence:
        - reviewer_verdict
      required_roles:
        - mission-contract-effectiveness-reviewer
      blocking: true
      source: inferred
  role_verdicts: []
  effectiveness_review:
    # M4.3：审查循环轮次的类型化计数器；契约 YAML 是事实来源。
    # trace JSONL 只把轮次记录为旁路传感证据，不能与这里冲突。
    # 通过 `harness contract patch --add-round` 递增。
    rounds_used: 0
    max_rounds: 3
    last_verdict: ""
  role_policy_overrides:
    # 可选：按阶段覆盖 professional_roles.stage_policies；未填写时使用 harness.yaml 默认策略。
    prd:
      required_execution_roles: []
      required_review_roles: []
      conditional_roles: []
