control_contract:
  type: memory_update_contract
  version: 1
  mission_id: "{{mission_id}}"
  stage: retrospective
  status: ready
  upstream:
    - path: "harness-runtime/harness/missions/{{mission_id}}/mission-contract.md"
    - path: "harness-runtime/harness/artifacts/{{mission_id}}/verify/verification-report.md"
    - path: "harness-runtime/harness/artifacts/{{mission_id}}/verify/acceptance-result.md"
    - path: "harness-runtime/harness/artifacts/{{mission_id}}/code-review/code-review.md"
  consumers:
    - project-context
    - project-knowledge
    - future-missions
    - stage-gate
  decisions:
    - id: MEM-01
      source: quality-control
      target: project-context
      target_ref: "project-context.md#历史教训"
      change_type: applied
      reason: "{{reason}}"
      blocking: false
    - id: MEM-02
      source: bug-fix
      target: test-template
      target_ref: ""
      change_type: proposed
      reason: "{{reason}}"
      blocking: false
  dora_signals:
    lead_time: "{{mission_lead_time}}"
    rework_count: 0
    review_hold_count: 0
    verification_failure_count: 0
    rollback_followup_count: 0
